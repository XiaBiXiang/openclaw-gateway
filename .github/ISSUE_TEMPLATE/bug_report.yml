name: Bug Report
description: Report a reproducible defect in routing, translation, packaging, or install flow.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the failure clearly and concretely.
      placeholder: The gateway returns a 502 when translating responses requests to a chat-completions upstream.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: The request should route to the local provider and return a translated responses payload.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Start the gateway with ...
        2. Send this request ...
        3. Observe the failure ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Sanitized Config Snippet
      description: Remove all secrets before pasting.
      render: json
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

