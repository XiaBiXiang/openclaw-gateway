name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build archive
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact="openclaw-gateway_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          outdir="dist/${artifact}"
          mkdir -p "${outdir}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary="${outdir}/openclaw-gateway.exe"
          else
            binary="${outdir}/openclaw-gateway"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o "${binary}" ./cmd/gateway

          cp README.md LICENSE "${outdir}/"
          cp configs/config.example.json "${outdir}/"
          cp docs/openclaw.md "${outdir}/"
          cp docs/install.md "${outdir}/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -rq "${artifact}.zip" "${artifact}")
            sha256sum "dist/${artifact}.zip" > "dist/${artifact}.zip.sha256"
          else
            tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
            sha256sum "dist/${artifact}.tar.gz" > "dist/${artifact}.tar.gz.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

